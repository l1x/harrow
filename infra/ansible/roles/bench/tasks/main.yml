# ---------------------------------------------------------------------------
# All hosts: packages + Docker + ECR login
# ---------------------------------------------------------------------------

- name: Enable community repository
  become: true
  ansible.builtin.lineinfile:
    path: /etc/apk/repositories
    regexp: '^#(.*/community)$'
    line: '\1'
    backrefs: true

- name: Add edge/testing repository for dool
  become: true
  ansible.builtin.lineinfile:
    path: /etc/apk/repositories
    line: "https://dl-cdn.alpinelinux.org/alpine/edge/testing"
    state: present

- name: Update apk index
  become: true
  ansible.builtin.command: apk update
  changed_when: true

- name: Install benchmark packages
  become: true
  ansible.builtin.package:
    name:
      - docker
      - jq
      - curl
      - aws-cli
    state: present

- name: Install performance monitoring tools
  become: true
  ansible.builtin.package:
    name:
      - perf
      - sysstat
      - procps-ng
      - ethtool
    state: present

- name: Check whether dool package is available
  become: true
  ansible.builtin.command: apk search -x dool
  register: dool_search
  changed_when: false
  failed_when: false

- name: Install dool when available
  become: true
  ansible.builtin.package:
    name: dool
    state: present
  when: dool_search.rc == 0 and (dool_search.stdout | trim) != ""

- name: Enable Docker at boot
  become: true
  ansible.builtin.command: rc-update add docker default
  changed_when: false

- name: Start Docker
  become: true
  ansible.builtin.command: rc-service docker start
  changed_when: false

- name: Add alpine user to docker group
  become: true
  ansible.builtin.user:
    name: alpine
    groups: docker
    append: true

- name: Reset connection for group membership
  ansible.builtin.meta: reset_connection

# Configure Docker daemon for performance
- name: Create Docker config directory
  become: true
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Configure Docker daemon
  become: true
  ansible.builtin.copy:
    content: |
      {
        "default-ulimits": {
          "nofile": { "Name": "nofile", "Hard": 32000, "Soft": 32000 }
        },
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
    dest: /etc/docker/daemon.json
    mode: "0644"

- name: Restart Docker with new config
  become: true
  ansible.builtin.command: rc-service docker restart
  changed_when: true

- name: ECR login
  ansible.builtin.shell: |
    aws ecr get-login-password --region {{ aws_region | default('eu-west-1') }} \
      | docker login --username AWS --password-stdin {{ ecr_registry }}
  changed_when: true

# ---------------------------------------------------------------------------
# Server only: pull images from ECR
# ---------------------------------------------------------------------------

- name: Pull harrow-perf-server from ECR
  ansible.builtin.command:
    cmd: "docker pull {{ ecr_registry }}/harrow/harrow-perf-server:latest"
  changed_when: true
  when: inventory_hostname in groups['server']

- name: Tag harrow-perf-server for local use
  ansible.builtin.command:
    cmd: "docker tag {{ ecr_registry }}/harrow/harrow-perf-server:latest harrow-perf-server"
  changed_when: true
  when: inventory_hostname in groups['server']

- name: Pull axum-perf-server from ECR
  ansible.builtin.command:
    cmd: "docker pull {{ ecr_registry }}/harrow/axum-perf-server:latest"
  changed_when: true
  when: inventory_hostname in groups['server']

- name: Tag axum-perf-server for local use
  ansible.builtin.command:
    cmd: "docker tag {{ ecr_registry }}/harrow/axum-perf-server:latest axum-perf-server"
  changed_when: true
  when: inventory_hostname in groups['server']

# ---------------------------------------------------------------------------
# Client only: pull bench tools + Vector
# ---------------------------------------------------------------------------

- name: Pull spinr (load tester) from ECR
  ansible.builtin.command:
    cmd: "docker pull {{ ecr_registry }}/harrow/spinr:latest"
  changed_when: true
  when: inventory_hostname in groups['client']

- name: Tag spinr for local use
  ansible.builtin.command:
    cmd: "docker tag {{ ecr_registry }}/harrow/spinr:latest spinr"
  changed_when: true
  when: inventory_hostname in groups['client']

- name: Copy vector.toml config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../vector/vector.toml"
    dest: ~/vector.toml
    mode: "0644"
  when: inventory_hostname in groups['client']

- name: Pull Vector image
  ansible.builtin.command:
    cmd: docker pull timberio/vector:latest-alpine
  changed_when: true
  when: inventory_hostname in groups['client']
