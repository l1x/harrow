[env]
_.python.venv = { path = ".venv", create = true }

[settings]
experimental = true

[tools]
rust = "1.91.1"
python = "3.13.7"
terraform = "latest"
uv = "0.8.19"
"github:can1357/oh-my-pi" = "latest"

[tasks.fmt]
description = "Check formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Run clippy with warnings as errors"
run = "cargo clippy --workspace -- -D warnings"

[tasks.test]
description = "Run all workspace tests"
run = "cargo test --workspace"

[tasks.lint]
description = "Run fmt + clippy"
depends = ["fmt", "clippy"]

[tasks.verify]
description = "Run fmt, clippy, and tests"
depends = ["fmt", "clippy", "test"]

[tasks.ci]
description = "Run full CI pipeline (fmt, clippy, test)"
depends = ["verify"]

[tasks."docker:prod-arm64:harrow-server-tokio"]
description = "Build prod ARM64 harrow-server-tokio image"
run = "docker build --provenance=false -t harrow-server-tokio:prod-arm64 -f tokio.prod.arm64.Dockerfile --target harrow-server-tokio ."

[tasks."docker:prod-arm64:axum-server"]
description = "Build prod ARM64 axum-server image"
