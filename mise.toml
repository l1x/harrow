description = "Push wrk3 to ECR"
depends = ["bench:ecr-login"]
run = "docker tag wrk3:arm64 ${ECR}/harrow/load-generators:wrk3-v${WRK3_VERSION} && docker push ${ECR}/harrow/load-generators:wrk3-v${WRK3_VERSION}"

[tasks."bench:ecr-push:wrk3".env]
AWS_PROFILE = "datadeft-dev"
ECR = "529001354082.dkr.ecr.eu-west-1.amazonaws.com"
WRK3_VERSION = "0.2.0"

[tasks."bench:ecr-push-all"]
description = "Push all bench images to ECR"
depends = [
  "bench:ecr-push:harrow-tokio",
  "bench:ecr-push:harrow-monoio",
  "bench:ecr-push:axum",
  "bench:ecr-push:tako",
  "bench:ecr-push:salvo",
  "bench:ecr-push:warp",
  "bench:ecr-push:ntex",
  "bench:ecr-push:harrow-jemalloc",
  "bench:ecr-push:axum-jemalloc",
  "bench:ecr-push:tako-jemalloc",
  "bench:ecr-push:salvo-jemalloc",
  "bench:ecr-push:warp-jemalloc",
  "bench:ecr-push:ntex-jemalloc",
  "bench:ecr-push:harrow-sysalloc",
  "bench:ecr-push:axum-sysalloc",
  "bench:ecr-push:tako-sysalloc",
  "bench:ecr-push:salvo-sysalloc",
  "bench:ecr-push:warp-sysalloc",
  "bench:ecr-push:ntex-sysalloc",
  "bench:ecr-push:spinr",
  "bench:ecr-push:wrk3",
]

[tasks."bench:build-push-loadgen"]
description = "Build and push load generator images to ECR"
depends = ["docker:loadgen:all", "bench:ecr-push:spinr", "bench:ecr-push:wrk3"]

[tasks."bench:ecr-push-perf"]
description = "Push perf-profiling bench images to ECR"
run = """
HARROW_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/')
ECR=529001354082.dkr.ecr.eu-west-1.amazonaws.com
aws ecr get-login-password --region eu-west-1 --profile datadeft-dev | docker login --username AWS --password-stdin https://$ECR
docker tag harrow-perf-server:perf-arm64 $ECR/harrow/harrow-perf-server:$HARROW_VERSION && docker push $ECR/harrow/harrow-perf-server:$HARROW_VERSION
docker tag axum-perf-server:perf-arm64 $ECR/harrow/axum-perf-server:$HARROW_VERSION && docker push $ECR/harrow/axum-perf-server:$HARROW_VERSION
docker tag spinr:$SPINR_VERSION-prod-arm64 $ECR/harrow/spinr:$SPINR_VERSION && docker push $ECR/harrow/spinr:$SPINR_VERSION
"""

[tasks."bench:ecr-push-perf".env]
AWS_PROFILE = "datadeft-dev"
SPINR_VERSION = "0.5.1"

[tasks."bench:ecr-push-loadgen".env]
AWS_PROFILE = "datadeft-dev"

[tasks."bench:pull-images"]
description = "Pull versioned bench images from ECR on all instances"
run = """
HARROW_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/')
cd infra/ansible && ansible-playbook playbooks/pull-images.yml --extra-vars "harrow_version=$HARROW_VERSION spinr_version={{env.SPINR_VERSION}}"
"""

[tasks."bench:pull-images".env]
AWS_PROFILE = "datadeft-dev"
SPINR_VERSION = "0.5.1"

[tasks."bench:setup-linux"]
description = "Provision bench EC2 instances via Ansible"
run = """
HARROW_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/')
cd infra/ansible && ansible-playbook playbooks/bench.yml --extra-vars "harrow_version=$HARROW_VERSION spinr_version={{env.SPINR_VERSION}}"
"""

[tasks."bench:setup-linux".env]
AWS_PROFILE = "datadeft-dev"
SPINR_VERSION = "0.5.1"

[tasks."bench:run"]
description = "Run remote perf test against bench instances"
run = """
cargo run -p harrow-bench --bin harrow-remote-perf-test -- \
    --server-ssh {{env.BENCH_SERVER_IP}} \
    --client-ssh {{env.BENCH_CLIENT_IP}} \
    --server-private {{env.BENCH_SERVER_PRIVATE_IP}} \
    --instance-type c8g.12xlarge \
    --duration 20 \
    --warmup 2 \
    --os-monitors \
    --config harrow-bench/spinr/text-c128.toml \
    --config harrow-bench/spinr/json-1kb-c128.toml
"""

[tasks."bench:run".env]
BENCH_SERVER_IP = "52.213.16.92"
BENCH_CLIENT_IP = "34.242.59.120"
BENCH_SERVER_PRIVATE_IP = "172.31.8.146"
